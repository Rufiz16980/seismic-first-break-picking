experiment:
  name: classical_baselines
  seed: 42
  asset: all
  framing: trace
data:
  index_csv: data/processed/split_index.csv
  processed_dir: processed/
  target_n_samples: 1500
  target_n_traces: 120
  normalization: per_trace
  cache_in_ram: false
model:
  architecture: sta_lta
training:
  batch_size: 128
  epochs: 1
output:
  tracking_uri: mlruns
  checkpoint_dir: models/classical
