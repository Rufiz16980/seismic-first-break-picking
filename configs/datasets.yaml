# Task-relevant HDF5 keys (from task description PDF)
required_keys:
  - "data_array"
  - "SHOTID"
  - "SHOT_PEG"
  - "SOURCE_X"
  - "SOURCE_Y"
  - "SOURCE_HT"
  - "REC_PEG"
  - "REC_X"
  - "REC_Y"
  - "REC_HT"
  - "SAMP_RATE"
  - "COORD_SCALE"
  - "HT_SCALE"
  - "SAMP_NUM"
  - "SPARE1"

# Extra keys of potential interest for EDA/validation
extra_useful_keys:
  - "FIRST_BREAK_TIME"
  - "FIRST_BREAK_AMPLIT"
  - "FIRST_BREAK_VELOCITY"
  - "MODELLED_BREAK_TIME"
  - "OFFSET"
  - "OFFSET_FLT"

# Hardpicks benchmark cross-validation folds (from mila-iqia/hardpicks)
benchmark_folds:
  fold_sudbury:
    train: ["halfmile", "lalor"]
    valid: ["brunswick"]
    test: ["sudbury"]
  fold_brunswick:
    train: ["sudbury", "halfmile"]
    valid: ["lalor"]
    test: ["brunswick"]
  fold_halfmile:
    train: ["lalor", "brunswick"]
    valid: ["sudbury"]
    test: ["halfmile"]
  fold_lalor:
    train: ["brunswick", "sudbury"]
    valid: ["halfmile"]
    test: ["lalor"]

visualization:
  examples_json: "results/visualization_examples.json"
  n_examples_per_asset: 3
